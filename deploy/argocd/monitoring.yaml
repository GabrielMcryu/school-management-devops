# Argo CD Application — installs the kube-prometheus-stack Helm chart
# (Prometheus + Grafana + Alertmanager + node-exporter + kube-state-metrics).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # A Helm chart hosted in a chart repo (not a path in your Git repo).
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.1.0        # chart version (appVersion v0.91.0)
    helm:
      releaseName: monitoring
      # Values trimmed for a single Standard_D2s_v3 (2 vCPU / 8 GB) already
      # running Argo CD + Django + Postgres. Drop these trims if you scale up.
      valuesObject:
        # --- Alertmanager: ENABLED for alerting (high memory, pod restarts,
        #     etc.
        alertmanager:
          enabled: true
          alertmanagerSpec:
            retention: 6h
            resources:
              requests: { cpu: 25m, memory: 64Mi }
              limits:   { cpu: 100m, memory: 128Mi }

        grafana:
          adminPassword: "admin"        # demo only — change for anything real
          persistence:
            enabled: false
          resources:
            requests: { cpu: 50m, memory: 192Mi }
            limits:   { cpu: 250m, memory: 512Mi }
          # Expose via the same nginx Ingress as the app, at /grafana

        # --- Prometheus: short retention, no PVC, capped resources ---
        prometheus:
          prometheusSpec:
            retention: 6h
            resources:
              requests: { cpu: 100m, memory: 400Mi }
              limits:   { cpu: 500m, memory: 800Mi }.
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # --- Lightweight exporters: keep (cheap, high value) ---
        nodeExporter:
          enabled: true
        kube-state-metrics:
          resources:
            requests: { cpu: 20m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }

        kubeEtcd: { enabled: false }
        kubeScheduler: { enabled: false }
        kubeControllerManager: { enabled: false }

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # the Prometheus Operator CRDs are large
