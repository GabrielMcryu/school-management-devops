name: Build, Scan & Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Postgres for the smoke test, reachable at localhost:5432 from the runner.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: school
          POSTGRES_USER: school
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school -d school"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase; the owner name may contain capitals.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once and load into the local Docker daemon so we can run and scan
      # it before we ever push.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          set -euo pipefail
          # Run the test suite inside the built image against the Postgres
          # service (host network so the container reaches localhost:5432).
          # Django creates and tears down its own test database.
          docker run --rm --network host \
            -e SECRET_KEY=ci-test-key \
            -e DEBUG=False \
            -e POSTGRES_DB=school \
            -e POSTGRES_USER=school \
            -e POSTGRES_PASSWORD=ci-password \
            -e POSTGRES_HOST=localhost \
            -e POSTGRES_PORT=5432 \
            "${IMAGE}:${GITHUB_SHA}" \
            python manage.py test --verbosity 2

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'        # fail the job (and skip the push) on findings
          format: table

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-runs from the build cache, so this only tags and pushes.
      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
